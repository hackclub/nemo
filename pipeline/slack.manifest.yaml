display_information:
  name: Mnemosyne Pipeline
  description: Automated Slack data ingestion for Mnemosyne
  background_color: "#611f69"

features:
  bot_user:
    display_name: mnemosyne-pipeline
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:read
      - channels:join
      - channels:history
      - reactions:read
      - users:read
    user:
      - admin.analytics:read
      - admin.users:read
      - admin.teams:read

settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - reaction_added
      - member_joined_channel
      - member_left_channel
      - team_join
      - channel_created
      - channel_archive
      - channel_unarchive
      - channel_rename
  socket_mode_enabled: true
